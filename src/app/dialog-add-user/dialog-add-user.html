<div *ngIf="loading"><mat-progress-bar mode="indeterminate"></mat-progress-bar></div>
<h2 mat-dialog-title>Add User</h2>
<mat-dialog-content>
  <div>
    <mat-form-field class="mr-16" appearance="outline">
      <mat-label>First name</mat-label>
      <input [(ngModel)]="user.firstName" matInput />
      <mat-hint>Please enter a name</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Last name</mat-label>
      <input [(ngModel)]="user.lastName" matInput />
      <mat-hint>Please enter a name</mat-hint>
    </mat-form-field>
  </div>

  <div>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date of birth</mat-label>
      <input [(ngModel)]="birthDate" matInput [matDatepicker]="picker" />
      <mat-hint>MM/DD/YYYY</mat-hint>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
  </div>

  <div>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Street + House no.</mat-label>
      <input [(ngModel)]="user.street" matInput />
      <mat-hint>Please enter a name</mat-hint>
    </mat-form-field>
  </div>

  <div>
    <mat-form-field class="mr-16" appearance="outline">
      <mat-label>Zip code</mat-label>
      <input [(ngModel)]="user.zipCode" matInput />
      <mat-hint>Please enter a name</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>City</mat-label>
      <input [(ngModel)]="user.city" matInput />
      <mat-hint>Please enter a name</mat-hint>
    </mat-form-field>
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button [disabled]="loading" matButton mat-dialog-close>Close</button>
  <button [disabled]="loading" matButton (click)="saveUser()">Save</button>
</mat-dialog-actions>
